<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 8 Results - Gemion Function</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex; min-height: 100vh; font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a1a; color: #fff;
        }

        /* --- CONTROL PANEL SIDEBAR & MOBILE SYSTEM RESPONSIVENESS --- */
        .sidebar-panel {
            width: 420px; background-color: #25252b; padding: 20px;
            overflow-y: auto; height: 100vh; border-right: 2px solid #333;
        }
        .sidebar-panel h2 { 
            margin-bottom: 15px; font-size: 20px; border-bottom: 1px solid #444; 
            padding-bottom: 5px; cursor: pointer; display: flex;
            justify-content: space-between; align-items: center;
        }
        .sidebar-panel h2::after { content: '▼'; font-size: 12px; transition: transform 0.2s; }
        .sidebar-panel h2.collapsed::after { content: '►'; }
        
        .collapsible-content { transition: max-height 0.2s ease-out, opacity 0.2s; max-height: 5000px; opacity: 1; overflow: visible; }
        .collapsible-content.collapsed { max-height: 0 !important; opacity: 0 !important; overflow: hidden !important; margin-bottom: 0 !important; padding: 0 !important; }

        /* --- RAINBOW PROGRESSION THEME STYLING --- */
        .sidebar-panel h2.tournament-title { color: #ef4444; } /* Red */
        .sidebar-panel h2.roster-title { color: #f97316; }     /* Orange */
        .sidebar-panel h2.layout-title { color: #eab308; }     /* Yellow */
        .sidebar-panel h2.character-title { color: #22c55e; }  /* Green */
        .sidebar-panel h2.gem-title { color: #3b82f6; }        /* Blue */
        
        .form-section { background: #1e1e24; padding: 12px; margin-bottom: 15px; border-radius: 6px; border-left: 4px solid #fff; position: relative; }
        .form-section.tournament-section { border-left-color: #ef4444; }
        .form-section.roster-section { border-left-color: #f97316; }
        .form-section.layout-config-section { border-left-color: #eab308; }
        .form-section.character-section { border-left-color: #22c55e; }
        .form-section.gem-section { border-left-color: #3b82f6; }
        
        .form-section h3 { font-size: 14px; margin-bottom: 10px; color: #ccc; }
        .form-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }
        input[type="text"], input[type="color"], select {
            width: 100%; padding: 6px; background: #2d2d35; border: 1px solid #444; color: #fff; border-radius: 4px; font-size: 13px;
        }
        input[type="color"] { height: 32px; padding: 2px; cursor: pointer; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #c95c22; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #22c55e; }
        label { font-size: 11px; color: #aaa; display: block; margin-bottom: 2px; }
        .input-group { flex: 1; position: relative; }
        .range-value { font-size: 11px; color: #ffdd57; font-weight: bold; margin-left: 5px; }

        /* Clear button interface styles */
        .clear-slot-btn {
            background: #4b2323; border: 1px solid #ef4444; color: #fca5a5;
            font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 4px;
            cursor: pointer; transition: background 0.15s; width: auto; margin-bottom: 6px;
        }
        .clear-slot-btn:hover { background: #7f1d1d; color: #fff; }
        
        .autocomplete-suggestions {
            position: absolute; top: 100%; left: 0; right: 0; background: #2d2d35;
            border: 1px solid #555; z-index: 999; max-height: 150px; overflow-y: auto;
            border-radius: 0 0 4px 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .suggestion-item { padding: 6px 10px; cursor: pointer; font-size: 12px; color: #fff; }
        .suggestion-item:hover { background: #444; color: #ffdd57; }

        button.download-btn {
            width: 100%; padding: 12px; background: #0284c7; border: none; color: white; font-weight: bold; font-size: 15px; border-radius: 6px; cursor: pointer; margin-top: 10px; transition: 0.2s;
        }
        button.download-btn:hover { background: #0369a1; }

        /* --- LIVE CANVAS PREVIEW AREA --- */
        .preview-pane {
            flex: 1; display: flex; background-color: #111; padding: 20px; overflow: auto;
        }
        
        .graphic-canvas {
            width: 960px; height: 540px; position: relative; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            background-color: #0d0d11; background-size: cover; background-position: center; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            margin: auto; flex-shrink: 0;
        }

        /* Isolated Symmetrical Layout Matrix Container */
        .grid-matrix-container {
            display: grid; grid-template-columns: 310px 601px; justify-content: center; grid-template-rows: 170px 160px;
            gap: 25px; transform-origin: center center; width: 936px; height: 355px;
        }

        /* FIX 1: Corner triangles generated via CSS Borders instead of linear-gradients. 
           This permanently prevents html2canvas from rendering anti-aliased dark/orange bleed lines */
        .graphic-canvas::before, .graphic-canvas::after {
            content: ''; position: absolute; z-index: 2; pointer-events: none;
            width: 0; height: 0; background: transparent;
        }
        .graphic-canvas::before {
            top: 0; left: 0;
            border-top-style: solid;
            border-top-color: var(--canvas-secondary-color, #c95c22);
            border-top-width: var(--triangle-height, 79px);
            border-right-style: solid;
            border-right-color: transparent;
            border-right-width: var(--triangle-width, 184px);
        }
        .graphic-canvas::after {
            bottom: 0; right: 0;
            border-bottom-style: solid;
            border-bottom-color: var(--canvas-secondary-color, #c95c22);
            border-bottom-width: var(--triangle-height, 79px);
            border-left-style: solid;
            border-left-color: transparent;
            border-left-width: var(--triangle-width, 184px);
        }

        .corner-text { 
            position: absolute; font-family: 'Arial Black', sans-serif; letter-spacing: 1px; z-index: 20; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
            white-space: normal; word-wrap: break-word; overflow-wrap: break-word; line-height: 1.1;
        }
        .tl-text, .tr-text { max-width: var(--corner-max-width-top, 230px); }
        .bl-text, .br-text { max-width: var(--corner-max-width-bottom, 300px); }
        .tr-text, .br-text { text-align: right; }

        /* Structural Assignments */
        .pos-1-wrapper { grid-column: 1; grid-row: 1 / span 2; position: relative; height: 355px; }
        .row-top-right { grid-column: 2; grid-row: 1; display: grid; grid-template-columns: repeat(3, 185px); gap: 23px; height: 170px; }
        .row-bottom-right { grid-column: 2; grid-row: 2; display: grid; grid-template-columns: repeat(4, 133px); gap: 23px; height: 160px; }

        /* The Roster Character Frame System */
        .slot-frame {
            position: relative; width: 100%; height: 100%;
            border-style: solid; display: flex; flex-direction: column; overflow: visible; opacity: 1; transition: opacity 0.2s;
        }
        .slot-frame.hidden-empty { border: none !important; background: transparent !important; }
        .slot-frame.hidden-empty * { display: none !important; }

        .image-container { position: relative; width: 100%; height: 100%; overflow: hidden; display: flex; z-index: 1; }
        
        /* Render Formatting Specs */
        .char-full { width: 100%; height: 100%; object-fit: cover; object-position: center; }
        .pane-split-container { display: flex; width: 100%; height: 100%; }
        .pane-half { width: 50%; height: 100%; overflow: hidden; position: relative; }
        .pane-half img { position: absolute; width: 200%; height: 100%; object-fit: cover; top: 0; }
        
        /* Tri-Line Split Divider Layout Container */
        .pane-divider-group { display: flex; height: 100%; z-index: 5; position: absolute; left: 50%; transform: translateX(-50%); }
        .pane-divider-black-l { height: 100%; background-color: #000; }
        .pane-divider-white { height: 100%; background-color: #fff; }
        .pane-divider-black-r { height: 100%; background-color: #000; }

        /* Floating Multi-Layered Gem Border System */
        .gem-box { position: absolute; z-index: 12; background-size: cover; background-position: center; }

        /* Identity Cards & Absolute Layered Typography Overlays */
        .rank-tag { 
            position: absolute; font-family: 'Arial Black', sans-serif; font-weight: 900; color: #fff; 
            z-index: 10; 
        }

        /* Pure Background Layer (Solid Vector Shape Base) */
        .meta-container { 
            position: absolute; bottom: -1px; left: -1px; right: -1px; 
            z-index: 30; pointer-events: none;
        }

        /* Decoupled Foreground Layer */
        .text-overlay-container {
            position: absolute; bottom: 0; left: 0; right: 0;
            text-align: center; font-family: 'Arial Black', sans-serif;
            z-index: 35; display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center; pointer-events: none;
            padding-left: 6px; padding-right: 6px;
        }

        .player-name { 
            font-weight: bold; color: #fff; 
            text-shadow: 0px 0px 6px #000000, 0px 0px 6px #000000, 0px 0px 6px #000000;
            display: inline-block; width: 100%; text-align: center;
            transform: scaleY(1.3); transform-origin: bottom;
            white-space: nowrap; 
        }
        .twitter-handle { 
            font-family: sans-serif; font-weight: bold; color: #fff;
            text-shadow: 1px 1px 3px #000, -1px -1px 3px #000, 1px -1px 3px #000, -1px 1px 3px #000;
            width: 100%; text-align: center; display: block;
            white-space: nowrap; 
        }

        /* --- MOBILE VIEW PORTRAIT OVERRIDES --- */
        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar-panel { width: 100%; height: auto; border-right: none; border-bottom: 2px solid #333; order: 2; padding: 15px; }
            .preview-pane { 
                width: 100%; height: auto; padding: 20px 10px; position: sticky; top: 0; z-index: 1000; 
                background-color: #0a0a0c; border-bottom: 2px solid #222; order: 1; 
                overflow: auto; justify-content: center;
            }
            .graphic-canvas { 
                --scale: 0.65;
                transform: scale(var(--scale)); 
                transform-origin: top left;
                margin: 0;
                margin-right: calc(960px * (var(--scale) - 1));
                margin-bottom: calc(540px * (var(--scale) - 1));
            }
        }
        @media (max-width: 700px) { .graphic-canvas { --scale: 0.50; } }
        @media (max-width: 500px) { .graphic-canvas { --scale: 0.40; } }
        @media (max-width: 400px) { .graphic-canvas { --scale: 0.32; } }
    </style>
</head>
<body>

    <div class="sidebar-panel">
        <h2 class="tournament-title" onclick="toggleSection('tournamentContent')">Tournament Info</h2>
        <div id="tournamentContent" class="collapsible-content">
            <div class="form-section tournament-section">
                <div class="form-row">
                    <div class="input-group"><label>Organizer (Top-Left Text)</label><input type="text" id="tlInput" value="Nagooyen Pro Tour" placeholder="Organizer" oninput="updateCanvas()"></div>
                    <div class="input-group"><label>Date (Top-Right Text)</label><input type="text" id="trInput" placeholder="Date" oninput="updateCanvas()"></div>
                </div>
                <div class="form-row">
                    <div class="input-group"><label>Tournament (Bottom-Left Text)</label><input type="text" id="blInput" value="Tournament #1 - 420 Entrants" placeholder="Subtitle" oninput="updateCanvas()"></div>
                    <div class="input-group"><label>URL (Bottom-Right Text)</label><input type="text" id="brInput" value="@NagooyenGames tinyurl.com/Top8Gemion tinyurl.com/GemionTourneys" placeholder="Bracket URL" oninput="updateCanvas()"></div>
                </div>
            </div>
        </div>

            <div id="slotsControlContainer"></div>
        </div>

        <h2 class="layout-title collapsed" onclick="toggleSection('layoutContent')">Layout Configurations</h2>
        <div id="layoutContent" class="collapsible-content collapsed">

                <div class="form-row">
                    <div class="input-group">
                        <label>Canvas Background Image</label>
                        <select id="bgInput" onchange="updateCanvas()"></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Primary Color</label>
                        <input type="color" id="primaryColorInput" value="#014101" onchange="updateCanvas()">
                    </div>
                    <div class="input-group">
                        <label>Secondary Color</label>
                        <input type="color" id="secondaryColorInput" value="#c95c22" onchange="updateCanvas()">
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Base Border Thickness <span id="borderValueDisplay" class="range-value">8px</span></label>
                        <input type="range" id="borderThicknessInput" min="4" max="18" value="8" oninput="updateCanvas()">
                    </div>
                    <div class="input-group">
                        <label>Grid Horizontal Scale <span id="hScaleValueDisplay" class="range-value">96%</span></label>

                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Corner Width Scale <span id="cWidthScaleValueDisplay" class="range-value">100%</span></label>
                        <input type="range" id="cWidthScaleInput" min="0" max="150" value="100" oninput="updateCanvas()">
                    </div>
                    <div class="input-group">
                        <label>Corner Height Scale <span id="cHeightScaleValueDisplay" class="range-value">100%</span></label>
                        <input type="range" id="cHeightScaleInput" min="0" max="150" value="100" oninput="updateCanvas()">
                    </div>
                </div>
                
                <h3>Split Divider Configuration (Widths)</h3>
                <div class="form-row">
                    <div class="input-group"><label>1st White <span id="w1Val" class="range-value">5px</span></label><input type="range" id="w1Input" min="1" max="12" value="5" oninput="updateCanvas()"></div>
                    <div class="input-group"><label>2-4 White <span id="w2Val" class="range-value">4px</span></label><input type="range" id="w2Input" min="1" max="12" value="4" oninput="updateCanvas()"></div>
                    <div class="input-group"><label>5-8 White <span id="w3Val" class="range-value">3px</span></label><input type="range" id="w3Input" min="1" max="12" value="3" oninput="updateCanvas()"></div>
                </div>
                <div class="form-row">
                    <div class="input-group"><label>1st Black <span id="b1Val" class="range-value">3px</span></label><input type="range" id="b1Input" min="1" max="12" value="3" oninput="updateCanvas()"></div>
                    <div class="input-group"><label>2-4 Black <span id="b2Val" class="range-value">2px</span></label><input type="range" id="b2Input" min="1" max="12" value="2" oninput="updateCanvas()"></div>
                    <div class="input-group"><label>5-8 Black <span id="b3Val" class="range-value">1px</span></label><input type="range" id="b3Input" min="1" max="12" value="1" oninput="updateCanvas()"></div>

                </div>
                <div class="form-row">
                    <div class="input-group"><label>Top-Left Size <span id="tlSizeVal" class="range-value">18px</span></label><input type="range" id="tlSizeInput" min="8" max="48" value="18" oninput="updateCanvas()"></div>
                    <div class="input-group"><label>Top-Right Size <span id="trSizeVal" class="range-value">18px</span></label><input type="range" id="trSizeInput" min="8" max="48" value="18" oninput="updateCanvas()"></div>

                </div>

        function getFormattedOrdinalDate() {
            const d = new Date();
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const day = d.getDate();
            let suffix = "th";
            if (day === 1 || day === 21 || day === 31) suffix = "st";
            else if (day === 2 || day === 22) suffix = "nd";
            else if (day === 3 || day === 23) suffix = "rd";
            return `${months[d.getMonth()]} ${day}${suffix}, ${d.getFullYear()}`;

        function getFitTextHTML(textString, baseFontSize, maxWidth, isHandle, forceHandleReduction) {
            if (!textString) return { html: '', isReduced: false };
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            let targetSize = baseFontSize;
            ctx.font = isHandle ? `bold ${targetSize}px sans-serif` : `bold ${targetSize}px "Arial Black"`;
            
            let wasReduced = false;
            
            if (!isHandle) {
                if (ctx.measureText(textString).width > maxWidth) {
                    targetSize = Math.round(baseFontSize * 0.50);
                    ctx.font = `bold ${targetSize}px "Arial Black"`;
                    wasReduced = true;
                }
            } else {
                if (forceHandleReduction || ctx.measureText(textString).width > maxWidth) {
                    targetSize = Math.round(baseFontSize * 0.75);
                    ctx.font = `bold ${targetSize}px sans-serif`;
                    wasReduced = true;
                }
            }
            
            let finalOutputString = textString;
            if (ctx.measureText(finalOutputString).width > maxWidth) {
                while (ctx.measureText(finalOutputString + '...').width > maxWidth && finalOutputString.length > 0) {
                    finalOutputString = finalOutputString.slice(0, -1);
                }
                finalOutputString += '...';
            }
            
            const styleClass = isHandle ? 'twitter-handle' : 'player-name';
            const htmlResult = `<div class="${styleClass}" style="font-size: ${targetSize}px;">${finalOutputString}</div>`;
            return { html: htmlResult, isReduced: wasReduced };
        }

        // Restores 3-line word wrapping engine tracking letter-spacing
        function getFitCornerTextHTML(textString, baseFontSize, maxWidth) {
            if (!textString) return '';
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.font = `bold ${baseFontSize}px "Arial Black", sans-serif`;
            
            function measureWidth(text) {
                if (!text) return 0;
                return ctx.measureText(text).width + (text.length * 1);
            }
            
            if (measureWidth(textString) <= maxWidth) {
                return textString;
            }
            
            const words = textString.split(/(\s+)/).filter(token => token.length > 0);
            let lines = [];
            let currentLine = '';
            
            for (let i = 0; i < words.length; i++) {
                let testLine = currentLine + words[i];
                if (measureWidth(testLine.trim()) > maxWidth && currentLine.trim() !== '') {
                    lines.push(currentLine.trim());
                    currentLine = words[i];
                } else {
                    currentLine = testLine;
                }
            }
            if (currentLine.trim() !== '') {
                lines.push(currentLine.trim());
            }
            
            if (lines.length > 3) {
                lines = lines.slice(0, 3);
                let truncatedLast = lines[2];
                while (measureWidth(truncatedLast + '...') > maxWidth && truncatedLast.length > 0) {
                    truncatedLast = truncatedLast.slice(0, -1);
                }
                lines[2] = truncatedLast + '...';
            } else {
                for (let k = 0; k < lines.length; k++) {
                    if (measureWidth(lines[k]) > maxWidth) {
                        let singleLine = lines[k];
                        while (measureWidth(singleLine + '...') > maxWidth && singleLine.length > 0) {
                            singleLine = singleLine.slice(0, -1);
                        }
                        lines[k] = singleLine + '...';
                    }
                }
            }
            
            return lines.join('<br>');
        }

        function getTransparentColor(hex) {
            let r = 0, g = 0, b = 0;
            if (hex.startsWith('#')) hex = hex.slice(1);
            if (hex.length === 3) {
                r = parseInt(hex[0]+hex[0], 16);
                g = parseInt(hex[1]+hex[1], 16);
                b = parseInt(hex[2]+hex[2], 16);
            } else if (hex.length === 6) {
                r = parseInt(hex.substring(0,2), 16);
                g = parseInt(hex.substring(2,4), 16);
                b = parseInt(hex.substring(4,6), 16);
            }
            return `rgba(${r}, ${g}, ${b}, 0)`;
        }

                const scaledTwitterFont = Math.round(twitterNameSize * scalar);
                
                const maxBannerHeightInPx = Math.round(170 * structuralTierScalar * (parseInt(bannerMaxHeight) / 100));
                const scaledTwitterPadding = Math.round(twitterBottomPadding * structuralTierScalar);
                const scaledSlantAngle = Math.round(bannerSlantAngle * structuralTierScalar);
                const scaledNameTwitterGap = Math.round(nameTwitterGap * structuralTierScalar);

                frameNode.style.borderColor = primaryColor;
                frameNode.style.borderWidth = `${scaledBorder}px`;
                frameNode.style.backgroundColor = forceOpaqueBlack ? "#000000" : "transparent";

                const leftOffset = scaledSlantAngle < 0 ? Math.abs(scaledSlantAngle) : 0;
                const rightOffset = scaledSlantAngle > 0 ? scaledSlantAngle : 0;
                
                // Gap overlay seal Fix: Expand frame background layer height +1px to organically overlap outer CSS borders
                metaContainer.style.height = (maxBannerHeightInPx + 1) + "px";
                
                // Pure rgba transition removes anti-aliasing bleeds inside html2canvas grid captures
                const transColor = getTransparentColor(primaryColor);

                if (scaledSlantAngle === 0) {
                    metaContainer.style.background = primaryColor;
                } else if (scaledSlantAngle < 0) {
                    const anglePct = (leftOffset / maxBannerHeightInPx) * 100;
                    metaContainer.style.background = `linear-gradient(to bottom right, ${transColor} ${anglePct}%, ${primaryColor} ${anglePct}%)`;
                } else {
                    const anglePct = (rightOffset / maxBannerHeightInPx) * 100;
                    metaContainer.style.background = `linear-gradient(to bottom left, ${transColor} ${anglePct}%, ${primaryColor} ${anglePct}%)`;
                }

                textOverlayContainer.style.height = `${(170 * structuralTierScalar) - scaledBorder}px`;
                textOverlayContainer.style.paddingBottom = `${scaledTwitterPadding}px`;

                rankNode.style.fontSize = scaledRankFont + "px";
                
                let rankShadows = [];
                if (scaledRankShadow > 0) {
                    rankShadows.push(`${scaledRankShadow}px ${scaledRankShadow}px 0 #000, -${scaledRankShadow}px -${scaledRankShadow}px 0 #000, ${scaledRankShadow}px -${scaledRankShadow}px 0 #000, -${scaledRankShadow}px ${scaledRankShadow}px 0 #000`);
                }
                if (scaledRankDrop > 0) {
                    rankShadows.push(`${scaledRankDrop}px ${scaledRankDrop}px 0 rgba(0,0,0,0.8)`);
                }
                
                rankNode.style.textShadow = rankShadows.length > 0 ? rankShadows.join(', ') : "none";
                
                rankNode.style.top = "-" + Math.round(5 * structuralTierScalar) + "px";
                rankNode.style.left = Math.round(12 * structuralTierScalar) + "px";

                const validChar1Key = getMapKeyInsensitive(charEnumMap, char1Key);
                const validChar2Key = getMapKeyInsensitive(charEnumMap, char2Key);
                const validGemKey = getMapKeyInsensitive(gemEnumMap, gemKey);

                const char1URL = validChar1Key ? charEnumMap[validChar1Key].url : "";
                const char2URL = validChar2Key ? charEnumMap[validChar2Key].url : "";
                const char1Offset = validChar1Key ? parseInt(charEnumMap[validChar1Key].offset) : 0;
                const char2Offset = validChar2Key ? parseInt(charEnumMap[validChar2Key].offset) : 0;
                const currentGemURL = validGemKey ? gemEnumMap[validGemKey] : "";

                let bW = divWeights.b3, wW = divWeights.w3;
                if (i === 1) { bW = divWeights.b1; wW = divWeights.w1; }
                else if (i >= 2 && i <= 4) { bW = divWeights.b2; wW = divWeights.w2; }

                let imageHTML = '';
                if (char1URL && char2URL) {
                    imageHTML = `
                        <div class="pane-split-container">
                            <div class="pane-half"><img src="${char1URL}" crossorigin="anonymous" style="left: calc(-50% + ${char1Offset}px);"></div>
                            <div class="pane-divider-group" style="width: ${bW * 2 + wW}px;">
                                <div class="pane-divider-black-l" style="width: ${bW}px;"></div>
                                <div class="pane-divider-white" style="width: ${wW}px;"></div>
                                <div class="pane-divider-black-r" style="width: ${bW}px;"></div>
                            </div>
                            <div class="pane-half"><img src="${char2URL}" crossorigin="anonymous" style="left: calc(-50% + ${char2Offset}px);"></div>
                        </div>`;
                } else if (char1URL || char2URL) {
                    imageHTML = `<img class="char-full" src="${char1URL || char2URL}" crossorigin="anonymous">`;
                }
                
                if (currentGemURL) {
                    const gemPos = gemPaddingOffset - 2;
                    let innerB, middleW;
                    
                    if (i === 1) {
                        innerB = innerB1;
                        middleW = middleW1;
                    } else {
                        innerB = innerBRest;
                        middleW = middleWRest;
                    }

                    imageHTML += `
                        <div class="gem-box" style="
                            top: ${gemPos}px; right: ${gemPos}px;
                            margin: ${innerB + middleW + innerB}px;
                            background-color: #000; padding: ${innerB}px;
                            border: none; display: inline-block;
                        ">
                            <div style="background-color: #fff; padding: ${middleW}px; display: block;">
                                <div style="background-color: #000; padding: ${innerB}px; display: block;">
                                    <div style="
                                        background-image: url('${currentGemURL}'); 
                                        background-size: cover; background-position: center; 
                                        width: ${scaledGemSize}px; height: ${scaledGemSize}px;
                                    "></div>
                                </div>
                            </div>
                        </div>`;
                }
                imgContainer.innerHTML = imageHTML;

                if (name1 || tw1 || name2 || tw2) {
                    metaContainer.style.display = 'block';
                    textOverlayContainer.style.display = 'flex';
                    
                    const resName1 = getFitTextHTML(name1, scaledNameFont, availableTextWidth, false, false);
                    const resTw1 = getFitTextHTML(tw1, scaledTwitterFont, availableTextWidth, true, resName1.isReduced);
                    
                    const resName2 = getFitTextHTML(name2, scaledNameFont, availableTextWidth, false, false);
                    const resTw2 = getFitTextHTML(tw2, scaledTwitterFont, availableTextWidth, true, resName2.isReduced);
                    
                    let completeLayoutHTML = '';
                    
                    if (name1) completeLayoutHTML += resName1.html;
                    if (tw1) {
                        if (name1) completeLayoutHTML += `<div style="height: ${scaledNameTwitterGap}px; width: 100%;"></div>`;
                        completeLayoutHTML += resTw1.html;
                    }
                    if (name2) {
                        if (name1 || tw1) completeLayoutHTML += `<div style="height: ${Math.max(2, Math.round(4 * structuralTierScalar))}px; width: 100%;"></div>`;
                        completeLayoutHTML += resName2.html;
                    }
                    if (tw2) {
                        if (name2) completeLayoutHTML += `<div style="height: ${scaledNameTwitterGap}px; width: 100%;"></div>`;
                        else if (name1 || tw1) completeLayoutHTML += `<div style="height: ${Math.max(2, Math.round(4 * structuralTierScalar))}px; width: 100%;"></div>`;
                        completeLayoutHTML += resTw2.html;
                    }
                    
                    textOverlayContainer.innerHTML = completeLayoutHTML;
                } else {
                    metaContainer.style.display = 'none';
                    textOverlayContainer.style.display = 'none';
                    textOverlayContainer.innerHTML = '';
                }
            }
        }

        function exportFinishedPNG() {
            const canvasTarget = document.getElementById('canvasTarget');
            
            const dateObj = new Date();
            const dateString = `${dateObj.getFullYear()}${String(dateObj.getMonth() + 1).padStart(2, '0')}${String(dateObj.getDate()).padStart(2, '0')}`;

            const rawTournamentName = document.getElementById('tlInput').value.trim();
            const safeFileName = rawTournamentName ? `${rawTournamentName}_GemionFunction_${dateString}` : `GemionFunction_${dateString}`;

            const renderContainer = document.createElement('div');
            renderContainer.style.position = 'absolute';
            renderContainer.style.top = '-9999px'; renderContainer.style.left = '-9999px';
            renderContainer.style.width = '960px'; renderContainer.style.height = '540px';
            renderContainer.style.overflow = 'hidden';
            document.body.appendChild(renderContainer);

            const canvasClone = canvasTarget.cloneNode(true);
            canvasClone.style.transform = 'none';
            canvasClone.style.left = '0'; canvasClone.style.top = '0'; canvasClone.style.margin = '0';
            
            const innerGrid = canvasClone.querySelector('#matrixGridTarget');
            const currentScale = document.getElementById('hScaleInput').value;
            innerGrid.style.transform = `scale(${currentScale / 100})`;
            
            renderContainer.appendChild(canvasClone);

            html2canvas(canvasClone, {
                useCORS: true,
                allowTaint: true,
                scale: 2, 
                width: 960, height: 540,
                backgroundColor: null,
                logging: false
            }).then(canvas => {
                const imageURI = canvas.toDataURL("image/png");
                const downloadAnchor = document.createElement('a');
                downloadAnchor.href = imageURI;
                downloadAnchor.download = `${safeFileName}.png`;
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                document.body.removeChild(downloadAnchor);
                document.body.removeChild(renderContainer);
            }).catch(err => {
                console.error("PNG Sandbox Capture Error: ", err);
                if(renderContainer.parentNode) { document.body.removeChild(renderContainer); }
                alert("PNG capture encountered a system error during sandbox rendering.");
            });
        }

        window.addEventListener('load', () => {
            document.getElementById('trInput').value = getFormattedOrdinalDate();
            
            // Build the background dropdown menu
            const bgSelect = document.getElementById('bgInput');
            let bgOptions = '';
            bgKeys.forEach(key => {
                bgOptions += `<option value="${bgEnumMap[key]}">${key}</option>`;
            });
            bgSelect.innerHTML = bgOptions;

            updateCanvas();
        });
    </script>
</body>
</html>
